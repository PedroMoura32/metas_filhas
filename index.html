<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎀 Metas das Filhas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --surface2: #f1f0ec;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --text: #1a1a1a; --text2: #6b6b6b; --text3: #9e9e9e;
      --radius: 10px; --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414; --surface: #1e1e1e; --surface2: #272727;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
        --text: #f0f0f0; --text2: #9e9e9e; --text3: #666;
      }
    }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
    .topbar { background: var(--surface); border-bottom: .5px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .topbar-title { font-size: 17px; font-weight: 700; }
    .topbar-sub { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .rate-badge { padding: 5px 16px; border-radius: 20px; background: #EDE9FE; color: #4C1D95; border: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .rate-edit-row { display: flex; align-items: center; gap: 6px; }
    .rate-input { width: 64px; padding: 5px 8px; font-size: 13px; border-radius: 7px; border: 1.5px solid #7C3AED; background: var(--surface); color: var(--text); font-family: inherit; }
    .btn-save { padding: 5px 14px; background: #7C3AED; color: white; border: none; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .btn-cancel { padding: 5px 10px; background: transparent; border: .5px solid var(--border2); border-radius: 7px; font-size: 12px; cursor: pointer; color: var(--text2); font-family: inherit; }
    .tabs { background: var(--surface); border-bottom: .5px solid var(--border); display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 12px 18px; font-size: 13px; border: none; background: transparent; cursor: pointer; font-family: inherit; white-space: nowrap; border-bottom: 2px solid transparent; color: var(--text2); font-weight: 400; transition: all .15s; }
    .tab.active { font-weight: 700; }
    .content { padding: 18px; max-width: 740px; margin: 0 auto; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    @media (max-width: 480px) { .grid3 { grid-template-columns: 1fr 1fr; } }
    .metric-card { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
    .metric-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .metric-val { font-size: 18px; font-weight: 700; }
    .metric-sub { font-size: 10px; color: var(--text2); margin-top: 3px; }
    .confirm-all-btn { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .confirm-all-btn:disabled { cursor: default; }
    .daughter-card { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .dcard-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .dname { font-size: 14px; font-weight: 600; }
    .dsub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .pbar-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .pbar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mini-goal { border-radius: 8px; padding: 10px 12px; }
    .mini-goal-name { font-size: 11px; font-weight: 500; margin-bottom: 2px; }
    .mini-goal-val { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
    .mini-pbar { height: 3px; border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
    .mini-pbar-fill { height: 100%; border-radius: 2px; }
    .mini-sub { font-size: 10px; color: var(--text2); }
    .dcard-monthly { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: .5px solid var(--border); }
    .dcard-monthly-label { font-size: 11px; color: var(--text2); }
    .dcard-monthly-val { font-size: 14px; font-weight: 700; }
    .dheader { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 14px; }
    .big-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; }
    .dheader-info-name { font-size: 17px; font-weight: 700; }
    .dheader-info-sub { font-size: 12px; color: var(--text2); margin-top: 5px; display: flex; gap: 14px; flex-wrap: wrap; }
    .goals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 520px) { .goals-grid { grid-template-columns: 1fr; } }
    .goal-card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; gap: 11px; border: .5px solid var(--border); transition: border-color .2s; animation: fadeIn .25s ease; }
    .goal-title { font-size: 14px; font-weight: 700; }
    .goal-subtitle { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .goal-pct { font-size: 13px; font-weight: 700; }
    .goal-pbar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .goal-pbar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
    .falta-txt { font-size: 10px; color: var(--text3); margin-top: 4px; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .streak-txt { font-size: 12px; color: var(--text2); }
    .suggestion-box { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
    .sug-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
    .sug-val { font-size: 17px; font-weight: 700; }
    .sug-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
    .confirm-row { display: flex; gap: 6px; align-items: stretch; }
    .confirm-btn { padding: 10px 0; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; font-family: inherit; flex: 1; border: none; }
    .custom-btn { padding: 10px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; background: transparent; }
    .custom-input-row { display: flex; gap: 6px; align-items: center; }
    .custom-input { padding: 9px 10px; font-size: 13px; border-radius: 8px; background: var(--surface); color: var(--text); font-family: inherit; flex: 1; border: 1.5px solid var(--border); }
    .confirmed-box { padding: 10px 12px; border-radius: 8px; background: var(--surface2); font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; }
    .hist-label { font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .hist-row { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 2px; }
    .hist-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 0 0 auto; width: 20px; }
    .hist-dot { width: 18px; height: 18px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
    .hist-ml { font-size: 7px; color: var(--text3); text-align: center; }
    .edit-icon-btn { font-size: 11px; padding: 3px 8px; background: var(--surface2); border: none; border-radius: 4px; cursor: pointer; color: var(--text2); font-family: inherit; }
    .goal-edit-form { display: flex; flex-direction: column; gap: 8px; }
    .goal-edit-form input { padding: 7px 10px; font-size: 13px; border-radius: 7px; background: var(--surface); color: var(--text); font-family: inherit; border: .5px solid var(--border2); }
    .btn-small { padding: 8px; border: none; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 14px; color: var(--text2); font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: #7C3AED; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span>Conectando ao banco de dados...</span>
  </div>
</div>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCN90lfxqhFTZkMXwbz4gUUcQT4Px60Gk",
  authDomain: "metas-filhas.firebaseapp.com",
  projectId: "metas-filhas",
  storageBucket: "metas-filhas.firebasestorage.app",
  messagingSenderId: "696859095015",
  appId: "1:696859095015:web:28d9ed7dd0a80b53335742",
  measurementId: "G-T3XR9PK6Y7"
};

const app    = initializeApp(firebaseConfig);
const db     = getFirestore(app);
const DOCREF = doc(db, "app", "dados");

const MN    = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const NAMES = ["Laura","Anna","Isabela"];
const COLORS = [
  { main:"#7C3AED", light:"#EDE9FE", dark:"#4C1D95", mid:"#A78BFA" },
  { main:"#059669", light:"#D1FAE5", dark:"#065F46", mid:"#34D399" },
  { main:"#D97706", light:"#FEF3C7", dark:"#92400E", mid:"#FCD34D" }
];
const DEFAULT = {
  interestRate: 0.5,
  daughters: [
    { id:"d0", bm:10, by:2018, goals:[{id:"d0g0",name:"Festa 15 anos",age:15,target:10000,deps:[]},{id:"d0g1",name:"Faculdade",age:18,target:20000,deps:[]}]},
    { id:"d1", bm:6,  by:2021, goals:[{id:"d1g0",name:"Festa 15 anos",age:15,target:10000,deps:[]},{id:"d1g1",name:"Faculdade",age:18,target:20000,deps:[]}]},
    { id:"d2", bm:3,  by:2024, goals:[{id:"d2g0",name:"Festa 15 anos",age:15,target:10000,deps:[]},{id:"d2g1",name:"Faculdade",age:18,target:20000,deps:[]}]}
  ]
};

const mk  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
const now = () => new Date();
const CUR = () => mk(now());
const curName = () => { const n=now(); return MN[n.getMonth()]+"/"+n.getFullYear(); };
const mRemain = (bm,by,age) => { const n=now(),t=new Date(by+age,bm-1,1); return Math.max(1,(t.getFullYear()-n.getFullYear())*12+(t.getMonth()-n.getMonth())); };
const pmt = (fv,n,r) => { if(n<=0)return 0; if(r===0)return fv/n; const m=r/100; return fv*m/(Math.pow(1+m,n)-1); };
const sum = deps => deps.reduce((s,d)=>s+d.amount,0);
const streak = deps => { let s=0,d=new Date(now().getFullYear(),now().getMonth(),1); for(let i=0;i<120;i++){ if(deps.find(x=>x.month===mk(d))){s++;d=new Date(d.getFullYear(),d.getMonth()-1,1);}else break; } return s; };
const last12 = () => Array.from({length:12},(_,i)=>{ const d=new Date(now().getFullYear(),now().getMonth()-11+i,1); return {key:mk(d),label:MN[d.getMonth()]}; });
const r2 = v => "R$\u00a0"+Math.round(v).toLocaleString("pt-BR");
const rc = v => "R$\u00a0"+v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const monthly = (d,g,rate) => { const sv=sum(g.deps),rem=Math.max(0,g.target-sv); return pmt(rem,mRemain(d.bm,d.by,g.age),rate); };

let S = { data:null, view:"overview", synced:false, saving:false, editRate:false, tempRate:"", editGoal:null, customDeposit:null, tempCustom:"" };
const set = patch => { S={...S,...patch}; render(); };

async function save(data) {
  set({saving:true});
  try { await setDoc(DOCREF, data); } catch(e) { console.error(e); }
  set({saving:false});
}
function upd(fn) { const nd=fn(S.data); set({data:nd}); save(nd); }

async function init() {
  try {
    const snap = await getDoc(DOCREF);
    set({ data: snap.exists() ? snap.data() : JSON.parse(JSON.stringify(DEFAULT)), synced:true });
  } catch { set({ data: JSON.parse(JSON.stringify(DEFAULT)), synced:false }); }

  onSnapshot(DOCREF, snap => {
    if(snap.exists() && !S.saving) set({ data: snap.data(), synced:true });
  }, () => set({synced:false}));
}

function confirmDep(di,gi,custom) {
  const C=CUR();
  upd(p => {
    const nd=JSON.parse(JSON.stringify(p));
    const d=nd.daughters[di], g=d.goals[gi];
    if(g.deps.find(x=>x.month===C)) return p;
    const sv=sum(g.deps), rem=Math.max(0,g.target-sv);
    const amt = (custom!=null&&custom>0) ? custom : pmt(rem,mRemain(d.bm,d.by,g.age),nd.interestRate);
    g.deps.push({month:C, amount:amt});
    return nd;
  });
  set({customDeposit:null, tempCustom:""});
}

function confirmAll() {
  const C=CUR();
  upd(p => {
    const nd=JSON.parse(JSON.stringify(p));
    nd.daughters.forEach(d => d.goals.forEach(g => {
      if(g.deps.find(x=>x.month===C)) return;
      const sv=sum(g.deps), rem=Math.max(0,g.target-sv);
      g.deps.push({month:C, amount:pmt(rem,mRemain(d.bm,d.by,g.age),nd.interestRate)});
    }));
    return nd;
  });
}

function render() {
  const root = document.getElementById("root");
  if(!root) return;
  if(!S.data) { root.innerHTML=`<div class="loading-screen"><div class="spinner"></div><span>Conectando...</span></div>`; return; }

  const C=CUR(), data=S.data;
  const allOk = data.daughters.every(d=>d.goals.every(g=>g.deps.find(x=>x.month===C)));
  const gTotal = data.daughters.reduce((s,d)=>s+d.goals.reduce((ss,g)=>ss+sum(g.deps),0),0);
  const gGoal  = data.daughters.reduce((s,d)=>s+d.goals.reduce((ss,g)=>ss+g.target,0),0);
  const gMon   = data.daughters.reduce((s,d)=>s+d.goals.reduce((ss,g)=>ss+monthly(d,g,data.interestRate),0),0);
  const dIdx   = S.view!=="overview" ? parseInt(S.view[1]) : -1;

  root.innerHTML = topbar(data) + tabs() + `<div class="content">${S.view==="overview" ? overview(data,gTotal,gGoal,gMon,allOk,C) : daughter(data,dIdx,C)}</div>`;
  bind();
}

function topbar(data) {
  const n=now(), ns=MN[n.getMonth()]+"/"+n.getFullYear();
  const sc=S.synced?"#059669":"#D97706", sl=S.saving?"Salvando...":S.synced?"Sincronizado":"Offline";
  const rate = S.editRate
    ? `<div class="rate-edit-row"><input class="rate-input" id="rateInput" type="number" step="0.1" min="0" max="5" value="${S.tempRate}"/><span style="font-size:12px;color:var(--text2)">% a.m.</span><button class="btn-save" id="rateSave">Salvar</button><button class="btn-cancel" id="rateCancel">✕</button></div>`
    : `<div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--text2)">Taxa:</span><button class="rate-badge" id="rateEdit">${data.interestRate.toFixed(2)}% a.m.</button></div>`;
  return `<div class="topbar"><div><div class="topbar-title">🎀 Metas das Filhas</div><div class="topbar-sub"><span class="sync-dot" style="background:${sc}"></span>${sl} · ${ns}</div></div>${rate}</div>`;
}

function tabs() {
  const ts=[{v:"overview",label:"Visão Geral",c:null},...NAMES.map((n,i)=>({v:`d${i}`,label:n,c:COLORS[i]}))];
  return `<div class="tabs">${ts.map(t=>`<button class="tab${S.view===t.v?" active":""}" data-view="${t.v}" style="${S.view===t.v?`color:${t.c?t.c.main:"var(--text)"};border-bottom:2px solid ${t.c?t.c.main:"var(--text)"}`:""}">${t.label}</button>`).join("")}</div>`;
}

function overview(data,gTotal,gGoal,gMon,allOk,C) {
  const pct=gGoal>0?(gTotal/gGoal*100):0;
  return `
    <div class="grid3">
      ${[["Total guardado",r2(gTotal),`${pct.toFixed(1)}% da meta`],["Meta total",r2(gGoal),"6 cofrinhos"],["Sugestão mensal",rc(gMon),`taxa ${data.interestRate.toFixed(2)}% a.m.`]].map(([l,v,s])=>`<div class="metric-card"><div class="metric-label">${l}</div><div class="metric-val">${v}</div><div class="metric-sub">${s}</div></div>`).join("")}
    </div>
    <button class="confirm-all-btn" id="confirmAll" ${allOk?"disabled":""} style="border:${allOk?".5px solid var(--border)":"1px solid #7C3AED"};background:${allOk?"var(--surface2)":"#EDE9FE"};color:${allOk?"var(--text2)":"#4C1D95"}">
      ${allOk?`✓ Todos os depósitos de ${curName()} confirmados`:`✦ Confirmar todos os depósitos de ${curName()}`}
    </button>
    ${data.daughters.map((d,di)=>{
      const c=COLORS[di],name=NAMES[di];
      const dt=d.goals.reduce((s,g)=>s+sum(g.deps),0), dg=d.goals.reduce((s,g)=>s+g.target,0);
      const dp=dg>0?Math.min(100,dt/dg*100):0, dm=d.goals.reduce((s,g)=>s+monthly(d,g,data.interestRate),0);
      return `<div class="daughter-card">
        <div class="dcard-top">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="avatar" style="background:${c.light};color:${c.dark}">${name[0]}</div>
            <div><div class="dname">${name}</div><div class="dsub">Nasc. ${MN[d.bm-1]}/${d.by} · Festa ${d.by+15} · Faculdade ${d.by+18}</div></div>
          </div>
          <div style="text-align:right"><div style="font-size:15px;font-weight:700;color:${c.main}">${r2(dt)}</div><div style="font-size:11px;color:var(--text2)">de ${r2(dg)}</div></div>
        </div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${dp}%;background:${c.main}"></div></div>
        <div class="grid2">
          ${d.goals.map(g=>{ const sv=sum(g.deps),p2=Math.min(100,sv/g.target*100),conf=g.deps.find(x=>x.month===C),st=streak(g.deps);
            return `<div class="mini-goal" style="background:${conf?c.light:"var(--surface2)"};border:${conf?`1px solid ${c.mid}`:"none"}">
              <div class="mini-goal-name" style="color:${conf?c.dark:"var(--text2)"}">${g.name} ${conf?"✓":""}</div>
              <div class="mini-goal-val" style="color:${conf?c.main:"var(--text)"}">${r2(sv)}</div>
              <div class="mini-pbar" style="background:${conf?c.mid+"40":"var(--border)"}"><div class="mini-pbar-fill" style="width:${p2}%;background:${c.main}"></div></div>
              <div class="mini-sub">${st>0?`🔥 ${st} mês${st>1?"es":""}`:r2(g.target)+" meta"}</div>
            </div>`;
          }).join("")}
        </div>
        <div class="dcard-monthly"><span class="dcard-monthly-label">Parcela mensal sugerida</span><span class="dcard-monthly-val" style="color:${c.main}">${rc(dm)}</span></div>
      </div>`;
    }).join("")}`;
}

function daughter(data,di,C) {
  const d=data.daughters[di], c=COLORS[di], name=NAMES[di], h12=last12();
  const goals = d.goals.map((g,gi)=>{
    const sv=sum(g.deps), rem=Math.max(0,g.target-sv), mo=mRemain(d.bm,d.by,g.age), mon=monthly(d,g,data.interestRate);
    const pct=g.target>0?Math.min(100,sv/g.target*100):0, st=streak(g.deps), conf=g.deps.find(x=>x.month===C);
    const key=`${di}-${gi}`, isCustom=S.customDeposit===key;
    const n=now(), elapsed=(n.getFullYear()-2026)*12+(n.getMonth()-3);
    let sk="inicio";
    if(pct>=100) sk="concluido";
    else if(elapsed>0&&mon>0){ const exp=elapsed*mon; sk=sv>=exp*1.05?"adiantado":sv>=exp*0.9?"em-dia":"atrasado"; }
    else if(sv>0) sk="adiantado";
    const SS={inicio:{bg:"#F5F3FF",c:"#5B21B6",l:"Iniciando"},adiantado:{bg:"#ECFDF5",c:"#065F46",l:"Adiantado"},"em-dia":{bg:"#FFFBEB",c:"#92400E",l:"Em dia"},atrasado:{bg:"#FEF2F2",c:"#991B1B",l:"Atrasado"},concluido:{bg:"#ECFDF5",c:"#065F46",l:"Meta atingida 🎉"}};
    const ss=SS[sk];

    if(S.editGoal===key) return `<div class="goal-card" style="border:1px solid ${c.main}">
      <div style="font-size:12px;font-weight:600;color:var(--text2)">Editar meta</div>
      <div class="goal-edit-form">
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Nome</div><input id="gNameInput" value="${g.name}" style="width:100%;border:1px solid ${c.main}"/></div>
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Valor alvo (R$)</div><input id="gAmtInput" value="${g.target}" type="number" style="width:100%"/></div>
        <div style="display:flex;gap:6px">
          <button class="btn-small" id="gSave_${di}_${gi}" style="flex:1;background:${c.main};color:white">Salvar</button>
          <button class="btn-small" id="gCancel" style="flex:1;background:transparent;border:.5px solid var(--border2);color:var(--text2)">Cancelar</button>
        </div>
      </div>
    </div>`;

    const confArea = conf
      ? `<div class="confirmed-box">✓ Depositado ${rc(conf.amount)} em ${curName()}</div>`
      : isCustom
      ? `<div class="custom-input-row"><input class="custom-input" id="customAmt_${di}_${gi}" type="number" placeholder="Valor (R$)" value="${S.tempCustom}" style="border-color:${c.main}"/><button class="btn-save" id="customConfirm_${di}_${gi}" style="padding:9px 14px">OK</button><button class="btn-cancel" id="customClose_${di}_${gi}" style="padding:9px 10px">✕</button></div>`
      : `<div class="confirm-row"><button class="confirm-btn" id="conf_${di}_${gi}" style="background:${c.light};color:${c.dark}">Confirmar ${rc(mon)}</button><button class="custom-btn" id="customOpen_${di}_${gi}" style="border:1px solid ${c.main};color:${c.main};border-radius:8px">Valor diferente</button></div>`;

    return `<div class="goal-card" style="border:.5px solid ${conf?c.main:"var(--border)"}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="goal-title">${g.name}</div><div class="goal-subtitle">Meta: ${r2(g.target)}</div></div>
        <button class="edit-icon-btn" id="gEdit_${di}_${gi}">Editar</button>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span class="goal-pct" style="color:${c.main}">${r2(sv)}</span>
          <span style="font-size:13px;font-weight:600;color:var(--text2)">${pct.toFixed(1)}%</span>
        </div>
        <div class="goal-pbar"><div class="goal-pbar-fill" style="width:${pct}%;background:${c.main}"></div></div>
        <div class="falta-txt">Faltam ${r2(rem)} · ${mo} meses restantes</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="badge" style="background:${ss.bg};color:${ss.c}">${ss.l}</span>
        <span class="streak-txt">${st>0?`🔥 ${st} mês${st>1?"es":""}`:"Sem sequência"}</span>
      </div>
      <div class="suggestion-box">
        <div class="sug-label">Sugestão mensal atual</div>
        <div class="sug-val" style="color:${c.main}">${rc(mon)}</div>
        <div class="sug-sub">${data.interestRate.toFixed(2)}% a.m. · ${mo} meses restantes</div>
      </div>
      ${confArea}
      <div>
        <div class="hist-label">Histórico 12 meses</div>
        <div class="hist-row">
          ${h12.map(m=>{ const dep=g.deps.find(x=>x.month===m.key), fut=m.key>C;
            return `<div class="hist-col"><div class="hist-dot" style="background:${fut?"var(--surface2)":dep?c.main:"var(--surface2)"};color:${fut?"transparent":dep?"white":"var(--text3)"};border:${dep&&!fut?`1px solid ${c.dark}`:".5px solid var(--border)"}">
              ${dep?"✓":fut?"":"—"}</div><div class="hist-ml">${m.label}</div></div>`;
          }).join("")}
        </div>
      </div>
    </div>`;
  }).join("");

  return `<div class="dheader">
    <div class="big-avatar" style="background:${c.light};color:${c.dark}">${name[0]}</div>
    <div><div class="dheader-info-name">${name}</div>
      <div class="dheader-info-sub"><span>Nasc. ${MN[d.bm-1]}/${d.by}</span><span style="color:${c.main}">🎉 Festa ${MN[d.bm-1]}/${d.by+15}</span><span style="color:${c.main}">🎓 Faculdade ${MN[d.bm-1]}/${d.by+18}</span></div>
    </div>
  </div>
  <div class="goals-grid">${goals}</div>`;
}

function bind() {
  const q=(id,fn)=>{const el=document.getElementById(id);if(el)el.onclick=fn;};
  document.querySelectorAll(".tab").forEach(el=>el.onclick=()=>set({view:el.dataset.view,editGoal:null,customDeposit:null}));
  q("rateEdit",  ()=>set({editRate:true,tempRate:String(S.data.interestRate)}));
  q("rateSave",  ()=>{ const v=parseFloat(document.getElementById("rateInput")?.value); if(!isNaN(v)&&v>=0) upd(p=>({...p,interestRate:v})); set({editRate:false}); });
  q("rateCancel",()=>set({editRate:false}));
  q("confirmAll",()=>confirmAll());
  q("gCancel",   ()=>set({editGoal:null}));
  document.querySelectorAll("[id^='conf_']").forEach(el=>{ el.onclick=()=>{ const[,di,gi]=el.id.split("_"); confirmDep(+di,+gi,null); }; });
  document.querySelectorAll("[id^='customOpen_']").forEach(el=>{ el.onclick=()=>{ const[,di,gi]=el.id.split("_"); set({customDeposit:`${di}-${gi}`,tempCustom:""}); }; });
  document.querySelectorAll("[id^='customClose_']").forEach(el=>{ el.onclick=()=>set({customDeposit:null,tempCustom:""}); });
  document.querySelectorAll("[id^='customConfirm_']").forEach(el=>{ el.onclick=()=>{ const[,di,gi]=el.id.split("_"); const v=parseFloat(document.getElementById(`customAmt_${di}_${gi}`)?.value); if(!isNaN(v)&&v>0) confirmDep(+di,+gi,v); }; });
  document.querySelectorAll("[id^='gEdit_']").forEach(el=>{ el.onclick=()=>{ const[,di,gi]=el.id.split("_"); const g=S.data.daughters[+di].goals[+gi]; set({editGoal:`${di}-${gi}`,tempGName:g.name,tempGAmount:String(g.target)}); }; });
  document.querySelectorAll("[id^='gSave_']").forEach(el=>{ el.onclick=()=>{ const[,di,gi]=el.id.split("_"); const nm=document.getElementById("gNameInput")?.value, amt=parseFloat(document.getElementById("gAmtInput")?.value); upd(p=>{ const nd=JSON.parse(JSON.stringify(p)); const g=nd.daughters[+di].goals[+gi]; if(nm)g.name=nm; if(!isNaN(amt)&&amt>0)g.target=amt; return nd; }); set({editGoal:null}); }; });
}

init();
</script>
</body>
</html>
