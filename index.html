<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎀 Metas das Filhas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface2: #f1f0ec;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a1a;
      --text2: #6b6b6b;
      --text3: #9e9e9e;
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414;
        --surface: #1e1e1e;
        --surface2: #272727;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
        --text: #f0f0f0;
        --text2: #9e9e9e;
        --text3: #666;
      }
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* TOPBAR */
    .topbar {
      background: var(--surface);
      border-bottom: .5px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-title { font-size: 17px; font-weight: 700; }
    .topbar-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .rate-badge {
      padding: 5px 16px;
      border-radius: 20px;
      background: #EDE9FE;
      color: #4C1D95;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }
    .rate-badge:hover { opacity: .85; }
    .rate-edit-row { display: flex; align-items: center; gap: 6px; }
    .rate-input {
      width: 64px;
      padding: 5px 8px;
      font-size: 13px;
      border-radius: 7px;
      border: 1.5px solid #7C3AED;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
    }
    .btn-save {
      padding: 5px 14px;
      background: #7C3AED;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .btn-cancel {
      padding: 5px 10px;
      background: transparent;
      border: .5px solid var(--border2);
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text2);
      font-family: inherit;
    }

    /* TABS */
    .tabs {
      background: var(--surface);
      border-bottom: .5px solid var(--border);
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 12px 18px;
      font-size: 13px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      font-weight: 400;
      transition: all .15s;
    }
    .tab.active { font-weight: 700; }

    /* CONTENT */
    .content {
      padding: 18px;
      max-width: 740px;
      margin: 0 auto;
    }

    /* METRIC CARDS */
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    @media (max-width: 480px) { .grid3 { grid-template-columns: 1fr 1fr; } }
    .metric-card {
      background: var(--surface);
      border: .5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .metric-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .metric-val { font-size: 18px; font-weight: 700; }
    .metric-sub { font-size: 10px; color: var(--text2); margin-top: 3px; }

    /* CONFIRM ALL */
    .confirm-all-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .confirm-all-btn:disabled { cursor: default; }

    /* DAUGHTER CARD (overview) */
    .daughter-card {
      background: var(--surface);
      border: .5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .dcard-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .dname { font-size: 14px; font-weight: 600; }
    .dsub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .pbar-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .pbar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mini-goal { border-radius: 8px; padding: 10px 12px; transition: all .2s; }
    .mini-goal-name { font-size: 11px; font-weight: 500; margin-bottom: 2px; }
    .mini-goal-val { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
    .mini-pbar { height: 3px; border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
    .mini-pbar-fill { height: 100%; border-radius: 2px; }
    .mini-sub { font-size: 10px; color: var(--text2); }
    .dcard-monthly {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; padding-top: 10px;
      border-top: .5px solid var(--border);
    }
    .dcard-monthly-label { font-size: 11px; color: var(--text2); }
    .dcard-monthly-val { font-size: 14px; font-weight: 700; }

    /* DAUGHTER DETAIL */
    .dheader {
      background: var(--surface);
      border: .5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeIn .2s ease;
    }
    .big-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; flex-shrink: 0;
    }
    .dheader-info-name { font-size: 17px; font-weight: 700; }
    .dheader-info-sub { font-size: 12px; color: var(--text2); margin-top: 5px; display: flex; gap: 14px; flex-wrap: wrap; }

    /* GOALS GRID */
    .goals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 520px) { .goals-grid { grid-template-columns: 1fr; } }
    .goal-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      border: .5px solid var(--border);
      transition: border-color .2s;
      animation: fadeIn .25s ease;
    }
    .goal-title { font-size: 14px; font-weight: 700; }
    .goal-subtitle { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .goal-pct { font-size: 13px; font-weight: 700; }
    .goal-pbar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .goal-pbar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
    .falta-txt { font-size: 10px; color: var(--text3); margin-top: 4px; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .streak-txt { font-size: 12px; color: var(--text2); }
    .suggestion-box { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
    .sug-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
    .sug-val { font-size: 17px; font-weight: 700; }
    .sug-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* CONFIRM AREA */
    .confirm-row { display: flex; gap: 6px; align-items: stretch; }
    .confirm-btn {
      padding: 10px 0; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; font-family: inherit; transition: all .15s; flex: 1;
      border: none;
    }
    .confirm-btn:hover:not(:disabled) { filter: brightness(.95); }
    .custom-btn {
      padding: 10px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0;
      background: transparent; transition: all .15s;
    }
    .custom-btn:hover { background: var(--surface2); }
    .custom-input-row { display: flex; gap: 6px; align-items: center; }
    .custom-input {
      padding: 9px 10px; font-size: 13px; border-radius: 8px;
      background: var(--surface); color: var(--text);
      font-family: inherit; flex: 1; border: 1.5px solid var(--border);
    }
    .confirmed-box {
      padding: 10px 12px; border-radius: 8px;
      background: var(--surface2);
      font-size: 13px; font-weight: 600; color: var(--text2);
      text-align: center;
    }

    /* HISTORY */
    .hist-label { font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .hist-row { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 2px; }
    .hist-row::-webkit-scrollbar { height: 3px; }
    .hist-row::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .hist-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 0 0 auto; width: 20px; }
    .hist-dot {
      width: 18px; height: 18px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700;
    }
    .hist-ml { font-size: 7px; color: var(--text3); text-align: center; }

    /* EDIT FORMS */
    .edit-icon-btn {
      font-size: 11px; padding: 3px 8px; background: var(--surface2);
      border: none; border-radius: 4px; cursor: pointer; color: var(--text2);
      font-family: inherit;
    }
    .edit-icon-btn:hover { background: var(--border); }
    .goal-edit-form { display: flex; flex-direction: column; gap: 8px; }
    .goal-edit-form input {
      padding: 7px 10px; font-size: 13px; border-radius: 7px;
      background: var(--surface); color: var(--text); font-family: inherit;
      border: .5px solid var(--border2);
    }
    .btn-small {
      padding: 8px; border: none; border-radius: 7px;
      font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600;
    }

    /* MODAL */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; animation: fadeIn .15s ease;
    }
    .modal {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 24px; width: 90%; max-width: 340px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .modal-input {
      width: 100%; padding: 9px 12px; font-size: 14px; border-radius: 8px;
      background: var(--surface2); color: var(--text);
      border: 1.5px solid var(--border2); font-family: inherit;
    }
    .modal-input:focus { outline: none; border-color: #7C3AED; }
    .modal-row { display: flex; gap: 8px; }
    .modal-btn {
      flex: 1; padding: 10px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: inherit; border: none;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const MN = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const NAMES = ["Laura","Anna","Isabela"];
const COLORS = [
  { main:"#7C3AED", light:"#EDE9FE", dark:"#4C1D95", mid:"#A78BFA" },
  { main:"#059669", light:"#D1FAE5", dark:"#065F46", mid:"#34D399" },
  { main:"#D97706", light:"#FEF3C7", dark:"#92400E", mid:"#FCD34D" }
];

function getToday() { return new Date(); }
function mk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }

function mRemain(bm, by, age) {
  const now = getToday();
  const td = new Date(by+age, bm-1, 1);
  return Math.max(1, (td.getFullYear()-now.getFullYear())*12 + (td.getMonth()-now.getMonth()));
}
function pmt(fv, n, r) {
  if (n <= 0) return 0;
  if (r === 0) return fv / n;
  const m = r / 100;
  return fv * m / (Math.pow(1+m, n) - 1);
}
function sumDeps(deps) { return deps.reduce((s,d) => s+d.amount, 0); }
function getStreak(deps) {
  let s = 0, d = new Date(getToday().getFullYear(), getToday().getMonth(), 1);
  for (let i = 0; i < 120; i++) {
    if (deps.find(x => x.month === mk(d))) { s++; d = new Date(d.getFullYear(), d.getMonth()-1, 1); }
    else break;
  }
  return s;
}
function last12() {
  const now = getToday();
  return Array.from({length:12}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-11+i, 1);
    return { key: mk(d), label: MN[d.getMonth()] };
  });
}
function r2(v) { return "R$\u00a0" + Math.round(v).toLocaleString("pt-BR"); }
function rc(v) { return "R$\u00a0" + v.toLocaleString("pt-BR", {minimumFractionDigits:2, maximumFractionDigits:2}); }
function calcMonthly(d, g, rate) {
  const sv = sumDeps(g.deps);
  const rem = Math.max(0, g.target - sv);
  return pmt(rem, mRemain(d.bm, d.by, g.age), rate);
}
function curMonth() { return mk(getToday()); }
function curMonthName() {
  const now = getToday();
  return MN[now.getMonth()] + "/" + now.getFullYear();
}

// ─── DEFAULT DATA ─────────────────────────────────────────────────────────────
const DEFAULT_DATA = {
  interestRate: 0.5,
  daughters: [
    { id:"d0", bm:10, by:2018, goals:[
      { id:"d0g0", name:"Festa 15 anos", age:15, target:10000, deps:[] },
      { id:"d0g1", name:"Faculdade",     age:18, target:20000, deps:[] }
    ]},
    { id:"d1", bm:6, by:2021, goals:[
      { id:"d1g0", name:"Festa 15 anos", age:15, target:10000, deps:[] },
      { id:"d1g1", name:"Faculdade",     age:18, target:20000, deps:[] }
    ]},
    { id:"d2", bm:3, by:2024, goals:[
      { id:"d2g0", name:"Festa 15 anos", age:15, target:10000, deps:[] },
      { id:"d2g1", name:"Faculdade",     age:18, target:20000, deps:[] }
    ]}
  ]
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  data: null,
  view: "overview",
  loading: true,
  editRate: false, tempRate: "",
  editGoal: null, tempGName: "", tempGAmount: "",
  customDeposit: null, tempCustom: "",
  modal: null  // { dIdx, gIdx, type: "custom" | "edit" }
};

function setState(patch) { state = { ...state, ...patch }; render(); }

function init() {
  try {
    const raw = localStorage.getItem("metas-filhas-v1");
    setState({ data: raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_DATA)), loading: false });
  } catch {
    setState({ data: JSON.parse(JSON.stringify(DEFAULT_DATA)), loading: false });
  }
}

function saveData(data) {
  try { localStorage.setItem("metas-filhas-v1", JSON.stringify(data)); } catch {}
}

function setData(updater) {
  const nd = typeof updater === "function" ? updater(state.data) : updater;
  saveData(nd);
  setState({ data: nd });
}

function confirmDeposit(dIdx, gIdx, customAmount) {
  const CUR = curMonth();
  setData(prev => {
    const nd = JSON.parse(JSON.stringify(prev));
    const d = nd.daughters[dIdx], g = d.goals[gIdx];
    if (g.deps.find(x => x.month === CUR)) return prev;
    const sv = sumDeps(g.deps), rem = Math.max(0, g.target - sv);
    const suggested = pmt(rem, mRemain(d.bm, d.by, g.age), nd.interestRate);
    const amount = (customAmount != null && customAmount > 0) ? customAmount : suggested;
    g.deps.push({ month: CUR, amount });
    return nd;
  });
  setState({ customDeposit: null, tempCustom: "", modal: null });
}

function confirmAll() {
  const CUR = curMonth();
  setData(prev => {
    const nd = JSON.parse(JSON.stringify(prev));
    nd.daughters.forEach((d, di) => d.goals.forEach((g, gi) => {
      if (g.deps.find(x => x.month === CUR)) return;
      const sv = sumDeps(g.deps), rem = Math.max(0, g.target - sv);
      const amount = pmt(rem, mRemain(d.bm, d.by, g.age), nd.interestRate);
      g.deps.push({ month: CUR, amount });
    }));
    return nd;
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if (!root) return;

  if (state.loading) {
    root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text2)">Carregando...</div>`;
    return;
  }

  const { data, view } = state;
  const CUR = curMonth();
  const allConfirmed = data.daughters.every(d => d.goals.every(g => g.deps.find(x => x.month === CUR)));
  const grandTotal = data.daughters.reduce((s,d) => s + d.goals.reduce((ss,g) => ss + sumDeps(g.deps), 0), 0);
  const grandGoal  = data.daughters.reduce((s,d) => s + d.goals.reduce((ss,g) => ss + g.target, 0), 0);
  const totalMonthly = data.daughters.reduce((s,d) => s + d.goals.reduce((ss,g) => ss + calcMonthly(d,g,data.interestRate), 0), 0);
  const dIdx = view !== "overview" ? parseInt(view[1]) : -1;

  root.innerHTML = `
    ${renderTopbar(data)}
    ${renderTabs(data, view)}
    <div class="content">
      ${view === "overview" ? renderOverview(data, grandTotal, grandGoal, totalMonthly, allConfirmed) : renderDaughter(data, dIdx)}
    </div>
    ${state.modal ? renderModal(data) : ""}
  `;
  bindEvents();
}

function renderTopbar(data) {
  const now = getToday();
  const nowStr = MN[now.getMonth()] + "/" + now.getFullYear();
  const rateSection = state.editRate
    ? `<div class="rate-edit-row">
        <input class="rate-input" id="rateInput" type="number" step="0.1" min="0" max="5" value="${state.tempRate}"/>
        <span style="font-size:12px;color:var(--text2)">% a.m.</span>
        <button class="btn-save" id="rateSave">Salvar</button>
        <button class="btn-cancel" id="rateCancel">✕</button>
      </div>`
    : `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--text2)">Taxa:</span>
        <button class="rate-badge" id="rateEdit">${data.interestRate.toFixed(2)}% a.m.</button>
      </div>`;
  return `<div class="topbar">
    <div>
      <div class="topbar-title">🎀 Metas das Filhas</div>
      <div class="topbar-sub">Dashboard · ${nowStr}</div>
    </div>
    ${rateSection}
  </div>`;
}

function renderTabs(data, view) {
  const tabs = [
    { v:"overview", label:"Visão Geral", c:null },
    ...NAMES.map((n,i) => ({ v:`d${i}`, label:n, c:COLORS[i] }))
  ];
  return `<div class="tabs">${tabs.map(t => `
    <button class="tab${view===t.v?" active":""}" data-view="${t.v}" style="${view===t.v ? `color:${t.c?t.c.main:"var(--text)"};border-bottom:2px solid ${t.c?t.c.main:"var(--text)"}` : ""}">
      ${t.label}
    </button>`).join("")}</div>`;
}

function renderOverview(data, grandTotal, grandGoal, totalMonthly, allConfirmed) {
  const pct = grandGoal > 0 ? (grandTotal/grandGoal*100) : 0;
  return `
    <div class="grid3">
      ${[
        ["Total guardado",        r2(grandTotal),     `${pct.toFixed(1)}% da meta`],
        ["Meta total",            r2(grandGoal),      "6 cofrinhos"],
        ["Sugestão mensal total", rc(totalMonthly),   `taxa ${data.interestRate.toFixed(2)}% a.m.`]
      ].map(([l,v,s]) => `
        <div class="metric-card">
          <div class="metric-label">${l}</div>
          <div class="metric-val">${v}</div>
          <div class="metric-sub">${s}</div>
        </div>`).join("")}
    </div>

    <button class="confirm-all-btn" id="confirmAll" ${allConfirmed?"disabled":""} style="
      border:${allConfirmed?".5px solid var(--border)":"1px solid #7C3AED"};
      background:${allConfirmed?"var(--surface2)":"#EDE9FE"};
      color:${allConfirmed?"var(--text2)":"#4C1D95"}">
      ${allConfirmed ? `✓ Todos os depósitos de ${curMonthName()} confirmados` : `✦ Confirmar todos os depósitos de ${curMonthName()}`}
    </button>

    ${data.daughters.map((d, dIdx) => {
      const c = COLORS[dIdx];
      const name = NAMES[dIdx];
      const dTotal = d.goals.reduce((s,g) => s + sumDeps(g.deps), 0);
      const dGoal  = d.goals.reduce((s,g) => s + g.target, 0);
      const dPct   = dGoal > 0 ? Math.min(100, dTotal/dGoal*100) : 0;
      const dMonthly = d.goals.reduce((s,g) => s + calcMonthly(d,g,data.interestRate), 0);
      const CUR = curMonth();
      return `
        <div class="daughter-card">
          <div class="dcard-top">
            <div style="display:flex;align-items:center;gap:10px">
              <div class="avatar" style="background:${c.light};color:${c.dark}">${name[0]}</div>
              <div>
                <div class="dname">${name}</div>
                <div class="dsub">Nasc. ${MN[d.bm-1]}/${d.by} · Festa ${d.by+15} · Faculdade ${d.by+18}</div>
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-size:15px;font-weight:700;color:${c.main}">${r2(dTotal)}</div>
              <div style="font-size:11px;color:var(--text2)">de ${r2(dGoal)}</div>
            </div>
          </div>
          <div class="pbar-track"><div class="pbar-fill" style="width:${dPct}%;background:${c.main}"></div></div>
          <div class="grid2">
            ${d.goals.map((g,gIdx) => {
              const sv = sumDeps(g.deps);
              const pct2 = Math.min(100, sv/g.target*100);
              const conf = g.deps.find(x => x.month === CUR);
              const strk = getStreak(g.deps);
              return `<div class="mini-goal" style="background:${conf?c.light:"var(--surface2)"};border:${conf?`1px solid ${c.mid}`:"none"}">
                <div class="mini-goal-name" style="color:${conf?c.dark:"var(--text2)"}">${g.name} ${conf?"✓":""}</div>
                <div class="mini-goal-val" style="color:${conf?c.main:"var(--text)"}">${r2(sv)}</div>
                <div class="mini-pbar" style="background:${conf?c.mid+"40":"var(--border)"}">
                  <div class="mini-pbar-fill" style="width:${pct2}%;background:${c.main}"></div>
                </div>
                <div class="mini-sub">${strk>0 ? `🔥 ${strk} mês${strk>1?"es":""}` : r2(g.target)+" meta"}</div>
              </div>`;
            }).join("")}
          </div>
          <div class="dcard-monthly">
            <span class="dcard-monthly-label">Parcela mensal sugerida</span>
            <span class="dcard-monthly-val" style="color:${c.main}">${rc(dMonthly)}</span>
          </div>
        </div>`;
    }).join("")}`;
}

function renderDaughter(data, dIdx) {
  const d = data.daughters[dIdx];
  const c = COLORS[dIdx];
  const name = NAMES[dIdx];
  const h12 = last12();
  const CUR = curMonth();

  const goalsHtml = d.goals.map((g, gIdx) => {
    const sv = sumDeps(g.deps);
    const rem = Math.max(0, g.target - sv);
    const months = mRemain(d.bm, d.by, g.age);
    const monthly = calcMonthly(d, g, data.interestRate);
    const pct = g.target > 0 ? Math.min(100, sv/g.target*100) : 0;
    const strk = getStreak(g.deps);
    const conf = g.deps.find(x => x.month === CUR);
    const goalKey = `${dIdx}-${gIdx}`;
    const isCustomOpen = state.customDeposit === goalKey;

    const now = getToday();
    const startElapsed = (now.getFullYear()-2026)*12 + (now.getMonth()-3);
    let statusKey = "inicio";
    if (pct >= 100) statusKey = "concluido";
    else if (startElapsed > 0 && monthly > 0) {
      const exp = startElapsed * monthly;
      statusKey = sv >= exp*1.05 ? "adiantado" : sv >= exp*0.9 ? "em-dia" : "atrasado";
    } else if (sv > 0) statusKey = "adiantado";
    const SS = {
      inicio:    { bg:"#F5F3FF", c:"#5B21B6", l:"Iniciando" },
      adiantado: { bg:"#ECFDF5", c:"#065F46", l:"Adiantado" },
      "em-dia":  { bg:"#FFFBEB", c:"#92400E", l:"Em dia" },
      atrasado:  { bg:"#FEF2F2", c:"#991B1B", l:"Atrasado" },
      concluido: { bg:"#ECFDF5", c:"#065F46", l:"Meta atingida 🎉" }
    };
    const ss = SS[statusKey];

    if (state.editGoal === goalKey) {
      return `<div class="goal-card" style="border:1px solid ${c.main}">
        <div style="font-size:12px;font-weight:600;color:var(--text2)">Editar meta</div>
        <div class="goal-edit-form">
          <div>
            <div style="font-size:11px;color:var(--text2);margin-bottom:4px">Nome</div>
            <input id="gNameInput" value="${g.name}" placeholder="Nome da meta" style="width:100%;border:1px solid ${c.main}"/>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text2);margin-bottom:4px">Valor alvo (R$)</div>
            <input id="gAmtInput" value="${g.target}" type="number" placeholder="Ex: 10000" style="width:100%"/>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-small" id="gSave_${dIdx}_${gIdx}" style="flex:1;background:${c.main};color:white">Salvar</button>
            <button class="btn-small" id="gCancel" style="flex:1;background:transparent;border:.5px solid var(--border2);color:var(--text2)">Cancelar</button>
          </div>
        </div>
      </div>`;
    }

    let confirmArea;
    if (conf) {
      confirmArea = `<div class="confirmed-box">✓ Depositado ${rc(conf.amount)} em ${curMonthName()}</div>`;
    } else if (isCustomOpen) {
      confirmArea = `<div class="custom-input-row">
        <input class="custom-input" id="customAmt_${dIdx}_${gIdx}" type="number" placeholder="Valor (R$)" value="${state.tempCustom}" style="border-color:${c.main}"/>
        <button class="btn-save" id="customConfirm_${dIdx}_${gIdx}" style="padding:9px 14px">OK</button>
        <button class="btn-cancel" id="customClose_${dIdx}_${gIdx}" style="padding:9px 10px">✕</button>
      </div>`;
    } else {
      confirmArea = `<div class="confirm-row">
        <button class="confirm-btn" id="conf_${dIdx}_${gIdx}" style="background:${c.light};color:${c.dark}">
          Confirmar ${rc(monthly)}
        </button>
        <button class="custom-btn" id="customOpen_${dIdx}_${gIdx}" style="border:1px solid ${c.main};color:${c.main};border-radius:8px">
          Valor diferente
        </button>
      </div>`;
    }

    return `<div class="goal-card" style="border:.5px solid ${conf?c.main:"var(--border)"}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="goal-title">${g.name}</div>
          <div class="goal-subtitle">Meta: ${r2(g.target)}</div>
        </div>
        <button class="edit-icon-btn" id="gEdit_${dIdx}_${gIdx}">Editar</button>
      </div>

      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span class="goal-pct" style="color:${c.main}">${r2(sv)}</span>
          <span style="font-size:13px;font-weight:600;color:var(--text2)">${pct.toFixed(1)}%</span>
        </div>
        <div class="goal-pbar"><div class="goal-pbar-fill" style="width:${pct}%;background:${c.main}"></div></div>
        <div class="falta-txt">Faltam ${r2(rem)} · ${months} meses restantes</div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="badge" style="background:${ss.bg};color:${ss.c}">${ss.l}</span>
        <span class="streak-txt">${strk>0 ? `🔥 ${strk} mês${strk>1?"es":""}` : "Sem sequência"}</span>
      </div>

      <div class="suggestion-box">
        <div class="sug-label">Sugestão mensal atual</div>
        <div class="sug-val" style="color:${c.main}">${rc(monthly)}</div>
        <div class="sug-sub">${data.interestRate.toFixed(2)}% a.m. · ${months} meses restantes</div>
      </div>

      ${confirmArea}

      <div>
        <div class="hist-label">Histórico 12 meses</div>
        <div class="hist-row">
          ${h12.map(m => {
            const dep = g.deps.find(x => x.month === m.key);
            const isFut = m.key > CUR;
            return `<div class="hist-col">
              <div class="hist-dot" style="
                background:${isFut ? "var(--surface2)" : dep ? c.main : "var(--surface2)"};
                color:${isFut ? "transparent" : dep ? "white" : "var(--text3)"};
                border:${dep && !isFut ? `1px solid ${c.dark}` : ".5px solid var(--border)"}">
                ${dep ? "✓" : isFut ? "" : "—"}
              </div>
              <div class="hist-ml">${m.label}</div>
            </div>`;
          }).join("")}
        </div>
      </div>
    </div>`;
  }).join("");

  return `
    <div class="dheader">
      <div class="big-avatar" style="background:${c.light};color:${c.dark}">${name[0]}</div>
      <div>
        <div class="dheader-info-name">${name}</div>
        <div class="dheader-info-sub">
          <span>Nasc. ${MN[d.bm-1]}/${d.by}</span>
          <span style="color:${c.main}">🎉 Festa ${MN[d.bm-1]}/${d.by+15}</span>
          <span style="color:${c.main}">🎓 Faculdade ${MN[d.bm-1]}/${d.by+18}</span>
        </div>
      </div>
    </div>
    <div class="goals-grid">${goalsHtml}</div>`;
}

  return "";
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents() {
  const q = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };

  // tabs
  document.querySelectorAll(".tab").forEach(el => {
    el.onclick = () => setState({ view: el.dataset.view, editGoal: null, customDeposit: null });
  });

  // rate
  q("rateEdit",   () => setState({ editRate: true, tempRate: String(state.data.interestRate) }));
  q("rateSave",   () => { const v = parseFloat(document.getElementById("rateInput")?.value); if (!isNaN(v) && v >= 0) setData(p => ({...p, interestRate: v})); setState({ editRate: false }); });
  q("rateCancel", () => setState({ editRate: false }));

  // confirm all
  q("confirmAll", () => confirmAll());

  // confirm individual
  document.querySelectorAll("[id^='conf_']").forEach(el => {
    el.onclick = () => { const [,di,gi] = el.id.split("_"); confirmDeposit(parseInt(di), parseInt(gi), null); };
  });

  // custom deposit
  document.querySelectorAll("[id^='customOpen_']").forEach(el => {
    el.onclick = () => { const [,di,gi] = el.id.split("_"); setState({ customDeposit:`${di}-${gi}`, tempCustom:"" }); };
  });
  document.querySelectorAll("[id^='customClose_']").forEach(el => {
    el.onclick = () => setState({ customDeposit: null, tempCustom: "" });
  });
  document.querySelectorAll("[id^='customConfirm_']").forEach(el => {
    el.onclick = () => {
      const [,di,gi] = el.id.split("_");
      const v = parseFloat(document.getElementById(`customAmt_${di}_${gi}`)?.value);
      if (!isNaN(v) && v > 0) confirmDeposit(parseInt(di), parseInt(gi), v);
    };
  });

  // edit goal
  q("gCancel", () => setState({ editGoal: null }));
  document.querySelectorAll("[id^='gEdit_']").forEach(el => {
    el.onclick = () => {
      const [,di,gi] = el.id.split("_");
      const g = state.data.daughters[parseInt(di)].goals[parseInt(gi)];
      setState({ editGoal:`${di}-${gi}`, tempGName:g.name, tempGAmount:String(g.target) });
    };
  });
  document.querySelectorAll("[id^='gSave_']").forEach(el => {
    el.onclick = () => {
      const [,di,gi] = el.id.split("_");
      const nm  = document.getElementById("gNameInput")?.value;
      const amt = parseFloat(document.getElementById("gAmtInput")?.value);
      setData(p => {
        const nd = JSON.parse(JSON.stringify(p));
        const g = nd.daughters[parseInt(di)].goals[parseInt(gi)];
        if (nm)              g.name   = nm;
        if (!isNaN(amt)&&amt>0) g.target = amt;
        return nd;
      });
      setState({ editGoal: null });
    };
  });
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
init();
</script>
